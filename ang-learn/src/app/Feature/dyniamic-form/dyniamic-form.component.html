<form [formGroup]="form" (ngSubmit)="submit()">

  @for(field of fields; track field.name) {

    <mat-form-field appearance="outline">

      <mat-label>
        {{ field.label }}
      </mat-label>

      <input
        matInput
        [type]="field.type"
        [formControlName]="field.name">

    </mat-form-field>

  }


  <button mat-raised-button type="submit">
    Submit
  </button>

</form>
